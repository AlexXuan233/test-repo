name: GitHub Branch Protection

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  call_reusable_github_bp:
    name: GitHub Branch Protection Scan
    uses: AlexXuan233/org-infra/.github/workflows/reusable_compliance.yml@add-github-bp-workflow
    with:
      complytime_config_path: complytime.yaml
    secrets:
      source_token: ${{ secrets.GITHUB_TOKEN }}

